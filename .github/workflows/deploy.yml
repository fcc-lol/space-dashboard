name: Deploy to fcc server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_DEPLOY_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan root.fcc.lol >> ~/.ssh/known_hosts

      - name: Deploy
        run: |
          git remote add fcc-server fcc@root.fcc.lol:/home/fcc/vite-apps/space-dashboard
          git push fcc-server main
